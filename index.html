<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIENBAN - TRANG CHỦ</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap');

        body { 
            font-family: 'Roboto', sans-serif; 
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e); 
            color: #fff; 
            margin: 0; 
            padding: 0; 
        }
        header { 
            background: rgba(0,0,0,0.95); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 4px solid #ffd700; 
        }
        .logo { font-size: 28px; font-weight: bold; color: #ffd700; letter-spacing: 2px; }
        
        h1 { 
            color: #ffd700; 
            text-align: center; 
            margin: 25px 0 15px; 
            text-shadow: 0 0 15px #ffd700;
        }

        .package { 
            background: linear-gradient(145deg, #1f1f2e, #141422); 
            margin: 18px; 
            padding: 28px; 
            border-radius: 16px; 
            border: 2px solid #ffd700; 
            text-align: center; 
            box-shadow: 0 0 25px rgba(255,215,0,0.2);
        }
        .package:hover { transform: translateY(-8px); box-shadow: 0 0 35px rgba(255,215,0,0.4); }

        .price { font-size: 52px; font-weight: bold; color: #ffd700; margin: 10px 0; }

        .btn { 
            background: linear-gradient(#ffd700, #b8860b); 
            color: #000; 
            padding: 16px 40px; 
            font-size: 19px; 
            font-weight: bold; 
            border: none; 
            border-radius: 50px; 
            width: 85%; 
            margin: 15px auto; 
            display: block; 
            cursor: pointer; 
        }

        .form-container {
            background: #1a1a1a;
            margin: 20px;
            padding: 25px;
            border-radius: 16px;
            border: 2px solid #ffd700;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2a3a;
            border: 1px solid #ffd700;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .qr-container {
            background: #f0f9ff;
            margin: 25px auto;
            max-width: 280px;
            padding: 15px;
            border: 12px solid #1e40af;
            border-radius: 20px;
        }
        .qr-container canvas {
            width: 100% !important;
            height: auto !important;
        }

        .info-box {
            background: #1a1a1a;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #ffd700;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; justify-content:center; gap:12px;">
            <span style="font-size:36px;">👑</span>
            <div class="logo">TIENBAN</div>
        </div>
    </header>

    <h1>GÓI GIAO DỊCH SIÊU ƯU ĐÃI</h1>

    <div class="package">
        <h2>GÓI 600K</h2>
        <p style="color:#aaa;">GIÁ MUA <span class="price">100K</span></p>
        <button class="btn" onclick="selectPackage(100000)">CHỌN GÓI</button>
    </div>

    <div class="package">
        <h2>GÓI 1.2M</h2>
        <p style="color:#aaa;">GIÁ MUA <span class="price">200K</span></p>
        <button class="btn" onclick="selectPackage(200000)">CHỌN GÓI</button>
    </div>

    <div class="package">
        <h2>GÓI 3M</h2>
        <p style="color:#aaa;">GIÁ MUA <span class="price">500K</span></p>
        <button class="btn" onclick="selectPackage(500000)">CHỌN GÓI</button>
    </div>

    <div class="package">
        <h2>GÓI 6M</h2>
        <p style="color:#aaa;">GIÁ MUA <span class="price">1M</span></p>
        <button class="btn" onclick="selectPackage(1000000)">CHỌN GÓI</button>
    </div>

    <!-- Form nhập thông tin KHÁCH HÀNG -->
    <div id="formScreen" style="display:none;">
        <div class="form-container">
            <h2 style="color:#ffd700; text-align:center;">Thông tin chuyển khoản của bạn</h2>
            <input type="text" id="stk" placeholder="Số tài khoản của bạn" required>
            <input type="text" id="tentk" placeholder="Tên chủ tài khoản của bạn" required>
            <input type="text" id="nganhang" placeholder="Ngân hàng của bạn (VD: Vietcombank)" required>

            <button class="btn" onclick="confirmAndShowQR()">XÁC NHẬN & TẠO QR CODE</button>
        </div>
    </div>

    <!-- QR Code của chủ web -->
    <div id="qrScreen" style="display:none;">
        <div class="qr-container">
            <canvas id="qr"></canvas>
        </div>

        <div class="info-box" id="transferInfo"></div>

        <div style="color: #ffd700; font-size: 26px; font-weight: bold; text-align: center; margin: 15px 0;">
            NGUYEN THI DONG
        </div>
        <p style="text-align:center; color:#aaa;">QR nhận tiền từ mọi ứng dụng chuyển tiền</p>
    </div>

    <div id="statusText" style="display:none; color: #ffd700; text-align: center; font-size: 18px; margin: 25px 0; font-weight: bold;">
        Hệ thống đang kiểm tra thanh toán tự động...
    </div>

    <button onclick="window.open('https://www.facebook.com/share/1UbWiKVei2/?mibextid=wwXIfr', '_blank')" 
            style="position:fixed; bottom:20px; left:20px; background:#00ff00; color:#000; padding:14px 20px; border:none; border-radius:50px; font-weight:bold; box-shadow:0 0 20px #00ff00;">
        💬 Hỗ trợ Khách hàng
    </button>

    <script>
        let currentAmount = 0;

        function selectPackage(amount) {
            currentAmount = amount;
            document.getElementById('formScreen').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function confirmAndShowQR() {
            const stk = document.getElementById('stk').value.trim();
            const tentk = document.getElementById('tentk').value.trim();
            const nganhang = document.getElementById('nganhang').value.trim();

            if (!stk || !tentk || !nganhang) {
                alert("Vui lòng nhập đầy đủ thông tin của bạn!");
                return;
            }

            document.getElementById('formScreen').style.display = 'none';
            document.getElementById('qrScreen').style.display = 'block';
            document.getElementById('statusText').style.display = 'block';

            generateRealQR();

            document.getElementById('transferInfo').innerHTML = `
                <strong>Số tiền:</strong> ${currentAmount.toLocaleString('vi-VN')} VND<br>
                <strong>Nội dung:</strong> TB6A25S<br><br>
                <strong>Ngân hàng nhận:</strong> ZaloPay / Mọi ngân hàng<br>
                <strong>STK nhận:</strong> 0916483947<br>
                <strong>Chủ tài khoản nhận:</strong> NGUYEN THI DONG<br><br>
                <strong>Thông tin người chuyển:</strong><br>
                ${tentk} - ${stk} - ${nganhang}
            `;

            window.scrollTo(0, document.body.scrollHeight);
        }

        function generateRealQR() {
            const data = "00020101021126400010vn.zalopay0115GPEI4GsNI4ENq8r020300238620010A00000072701320006970454011899ZP26027M390192840208QRIBFTTA5204739953037045802VN63048BCB";
            const qr = qrcode(0, 'M');
            qr.addData(data);
            qr.make();

            const size = qr.getModuleCount();
            const scale = 6.8;
            const border = 4;

            const canvas = document.getElementById("qr");
            const ctx = canvas.getContext("2d");

            canvas.width = (size + border * 2) * scale;
            canvas.height = (size + border * 2) * scale;

            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#000";
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (qr.isDark(r, c)) {
                        ctx.fillRect((c + border) * scale, (r + border) * scale, scale, scale);
                    }
                }
            }
        }
    </script>
</body>
</html>
